name: Daily AI Update

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点 (北京时间 8点)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Generate daily report
        run: |
          python3 << 'EOF'
          import datetime
          from pathlib import Path
          
          today = datetime.datetime.now().strftime("%Y%m%d")
          filename = f"DAILY_REPORT_{today}.md"
          
          content = f"""# 📡 AI Agent Daily Report - {today}

## 🔥 Today's Top AI News

> Automated daily AI news summary

### Latest Trends

- AI agents are becoming more autonomous
- LLM applications continue to grow
- Open source AI tools gaining popularity

### Useful Resources

- [OpenClaw](https://github.com/openclaw/openclaw) - AI Assistant Framework
- [Awesome AI Agent Skills](https://github.com/yy1142274323/awesome-ai-agent-skills) - Daily AI Insights

---
*Generated by Jarvis*
"""
          
          Path(filename).write_text(content)
          print(f"Created {filename}")
          EOF
      
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily AI report update"
          file_pattern: "DAILY_REPORT_*.md"
